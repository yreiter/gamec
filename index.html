<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON VOID</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: none;
  }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 20px;
    pointer-events: none;
    z-index: 10;
  }
  .hud-block { display: flex; flex-direction: column; gap: 4px; }
  .hud-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #0ff8;
    text-transform: uppercase;
  }
  .hud-value {
    font-size: 24px;
    font-weight: bold;
    color: #0ff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    letter-spacing: 2px;
  }
  #lives-display { display: flex; gap: 6px; }
  .life-icon {
    width: 18px; height: 18px;
    position: relative;
  }
  .life-icon svg { width: 100%; height: 100%; }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000d;
    z-index: 20;
    transition: opacity 0.4s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-title {
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900;
    letter-spacing: 8px;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
    margin-bottom: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  .overlay-sub {
    font-size: clamp(12px, 2vw, 18px);
    color: #f0f;
    letter-spacing: 4px;
    text-shadow: 0 0 10px #f0f;
    margin-bottom: 40px;
  }
  .overlay-score {
    font-size: 28px;
    color: #ff0;
    text-shadow: 0 0 10px #ff0;
    margin-bottom: 8px;
    letter-spacing: 3px;
  }
  .overlay-hiscore {
    font-size: 16px;
    color: #fa0;
    text-shadow: 0 0 8px #fa0;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }
  .start-btn {
    padding: 14px 50px;
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 4px;
    color: #000;
    background: #0ff;
    border: none;
    cursor: pointer;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    transition: all 0.2s;
    text-transform: uppercase;
    box-shadow: 0 0 20px #0ff, 0 0 40px #0ff8;
  }
  .start-btn:hover {
    background: #fff;
    box-shadow: 0 0 30px #0ff, 0 0 60px #0ff;
    transform: scale(1.05);
  }
  .controls-hint {
    margin-top: 30px;
    color: #0888;
    font-size: 12px;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2;
  }
  #wave-announce {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 900;
    color: #f0f;
    text-shadow: 0 0 20px #f0f, 0 0 40px #f0f;
    letter-spacing: 8px;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #wave-announce.show { opacity: 1; }
  #powerup-msg {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #powerup-msg.show { opacity: 1; }
  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff; }
    50% { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div class="hud-block">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="score-display">0</span>
  </div>
  <div class="hud-block" style="align-items:center">
    <span class="hud-label">Wave</span>
    <span class="hud-value" id="wave-display">1</span>
  </div>
  <div class="hud-block" style="align-items:flex-end">
    <span class="hud-label">Lives</span>
    <div id="lives-display"></div>
  </div>
</div>

<div id="wave-announce">WAVE 1</div>
<div id="powerup-msg"></div>

<div id="overlay">
  <div class="overlay-title">NEON VOID</div>
  <div class="overlay-sub">A SPACE SHOOTER</div>
  <div class="overlay-score" id="final-score" style="display:none"></div>
  <div class="overlay-hiscore" id="hi-score-display"></div>
  <button class="start-btn" id="start-btn">PLAY</button>
  <div class="controls-hint">
    ARROW KEYS / WASD — MOVE &nbsp;|&nbsp; SPACE — SHOOT<br>
    OR MOVE YOUR MOUSE &nbsp;|&nbsp; CLICK — SHOOT
  </div>
</div>

<script>
// ─── Canvas setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight * 0.98, 700);
  canvas.width = Math.floor(s * 0.75);
  canvas.height = Math.floor(s);
}
resize();
window.addEventListener('resize', resize);

// ─── Audio (Web Audio API) ───────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ac;
function getAC() { if (!ac) ac = new AudioCtx(); return ac; }

function playTone(freq, type, duration, vol = 0.3, attack = 0.01, decay = 0.1) {
  try {
    const c = getAC();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(vol, c.currentTime + attack);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + attack + decay);
    o.start(c.currentTime); o.stop(c.currentTime + duration);
  } catch(e) {}
}

function playShoot() { playTone(880, 'square', 0.08, 0.12, 0.005, 0.07); }
function playExplode(big) {
  playTone(big ? 120 : 200, 'sawtooth', big ? 0.5 : 0.3, big ? 0.35 : 0.25, 0.005, big ? 0.45 : 0.28);
}
function playPowerup() {
  [440, 550, 660, 880].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.15,0.2,0.01,0.1), i*60));
}
function playLevelUp() {
  [330,440,550,660,880].forEach((f,i) => setTimeout(() => playTone(f,'triangle',0.2,0.25,0.01,0.15), i*80));
}
function playHit() { playTone(160, 'sawtooth', 0.15, 0.3, 0.005, 0.14); }

// ─── State ───────────────────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, hiScore = parseInt(localStorage.getItem('nv_hi') || '0');
let lives = 3, wave = 1;
let frameId;

// ─── Stars ───────────────────────────────────────────────────────────────────
const STAR_COUNT = 120;
let stars = [];
function initStars() {
  stars = Array.from({length: STAR_COUNT}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    spd: Math.random() * 0.6 + 0.2,
    bright: Math.random()
  }));
}

// ─── Particles ───────────────────────────────────────────────────────────────
let particles = [];
function spawnExplosion(x, y, color, count = 20, big = false) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * (big ? 5 : 3.5) + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: Math.random() * 0.03 + (big ? 0.015 : 0.025),
      r: Math.random() * (big ? 4 : 2.5) + 1,
      color,
    });
  }
}

// ─── Player ──────────────────────────────────────────────────────────────────
let player = {};
function initPlayer() {
  player = {
    x: canvas.width / 2,
    y: canvas.height - 60,
    w: 36, h: 36,
    spd: 5,
    invincible: 0,
    shield: 0,
    rapidfire: 0,
    spread: 0,
    shootCooldown: 0,
    trail: [],
  };
}

// ─── Bullets ─────────────────────────────────────────────────────────────────
let bullets = [];
function shoot() {
  if (player.shootCooldown > 0) return;
  const cd = player.rapidfire > 0 ? 6 : 14;
  player.shootCooldown = cd;
  const bx = player.x, by = player.y - player.h / 2;
  if (player.spread > 0) {
    [-18, -9, 0, 9, 18].forEach(ang => {
      const rad = (ang * Math.PI) / 180;
      bullets.push({ x: bx, y: by, vx: Math.sin(rad) * 9, vy: -Math.cos(rad) * 9, fromPlayer: true });
    });
  } else {
    bullets.push({ x: bx, y: by, vx: 0, vy: -11, fromPlayer: true });
    if (player.rapidfire > 0) {
      bullets.push({ x: bx - 10, y: by + 6, vx: -0.5, vy: -11, fromPlayer: true });
      bullets.push({ x: bx + 10, y: by + 6, vx: 0.5, vy: -11, fromPlayer: true });
    }
  }
  playShoot();
}

// ─── Enemies ─────────────────────────────────────────────────────────────────
let enemies = [];
let enemyBullets = [];
let waveTimer = 0;
let waveCleared = false;

const ENEMY_TYPES = {
  basic:   { r: 14, hp: 1, pts: 100, color: '#f0f', spd: 1.2, fire: 0.003 },
  tough:   { r: 18, hp: 3, pts: 250, color: '#f80', spd: 0.9, fire: 0.004 },
  fast:    { r: 10, hp: 1, pts: 150, color: '#0ff', spd: 2.2, fire: 0.002 },
  boss:    { r: 32, hp: 30, pts: 2000, color: '#ff0', spd: 0.6, fire: 0.012 },
};

function spawnWave(w) {
  enemies = [];
  enemyBullets = [];
  waveCleared = false;
  const cols = Math.min(8, 4 + Math.floor(w / 2));
  const rows = Math.min(5, 2 + Math.floor(w / 3));
  const isBossWave = w % 5 === 0;

  if (isBossWave) {
    const t = ENEMY_TYPES.boss;
    enemies.push({
      x: canvas.width / 2, y: 80,
      vx: t.spd * (Math.random() < 0.5 ? 1 : -1), vy: 0,
      type: 'boss', ...t, maxHp: t.hp + (w - 5) * 6,
      hp: t.hp + (w - 5) * 6, pts: t.pts + w * 200,
      phase: 0, phaseTimer: 0,
    });
    return;
  }

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const isEdge = col === 0 || col === cols - 1;
      const isBack = row === rows - 1;
      const type = isBack && w > 2 ? 'tough' : isEdge && w > 1 ? 'fast' : 'basic';
      const t = ENEMY_TYPES[type];
      const sx = (canvas.width / (cols + 1)) * (col + 1);
      const sy = 60 + row * 55;
      enemies.push({
        x: sx, y: sy,
        vx: t.spd * (Math.random() < 0.5 ? 0.5 : -0.5), vy: 0,
        type, ...t, maxHp: t.hp,
        wobble: Math.random() * Math.PI * 2,
      });
    }
  }
}

// ─── Powerups ─────────────────────────────────────────────────────────────────
let powerups = [];
const PU_TYPES = [
  { id: 'shield',    color: '#4ff', label: 'SHIELD',     icon: '◈' },
  { id: 'rapidfire', color: '#f84', label: 'RAPID FIRE', icon: '⚡' },
  { id: 'spread',    color: '#f4f', label: 'SPREAD SHOT',icon: '✦' },
  { id: 'life',      color: '#f44', label: '+1 LIFE',    icon: '♥' },
];

function maybeDropPowerup(x, y) {
  if (Math.random() < 0.12) {
    const pu = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
    powerups.push({ x, y, vy: 1.2, ...pu, life: 1, angle: 0 });
  }
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
let mouseX = -1, mouseDown = false;

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'playing' && e.code === 'Space') { e.preventDefault(); shoot(); }
  if ((state === 'idle' || state === 'dead') && (e.code === 'Enter' || e.code === 'Space')) startGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
});
canvas.addEventListener('mousedown', () => { mouseDown = true; if (state === 'playing') shoot(); });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  mouseDown = true;
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  if (state === 'playing') shoot();
  if (state === 'idle' || state === 'dead') startGame();
});
canvas.addEventListener('touchend', () => { mouseDown = false; });

// ─── UI helpers ──────────────────────────────────────────────────────────────
const scoreEl = document.getElementById('score-display');
const waveEl  = document.getElementById('wave-display');
const livesEl = document.getElementById('lives-display');
const overlay = document.getElementById('overlay');
const finalScoreEl = document.getElementById('final-score');
const hiScoreEl = document.getElementById('hi-score-display');
const startBtn = document.getElementById('start-btn');
const waveAnnounce = document.getElementById('wave-announce');
const powerupMsg = document.getElementById('powerup-msg');

function updateHUD() {
  scoreEl.textContent = score.toString().padStart(6, '0');
  waveEl.textContent = wave;
  livesEl.innerHTML = Array.from({length: lives}, () =>
    `<div class="life-icon"><svg viewBox="0 0 18 18">
      <polygon points="9,2 11,7 17,7 12,11 14,17 9,13 4,17 6,11 1,7 7,7" fill="#f44" filter="url(#glow)"/>
    </svg></div>`
  ).join('');
}

let waveAnnTimeout;
function showWaveAnnounce(w) {
  waveAnnounce.textContent = w % 5 === 0 ? `⚠ BOSS WAVE ${w} ⚠` : `WAVE ${w}`;
  waveAnnounce.style.color = w % 5 === 0 ? '#ff0' : '#f0f';
  waveAnnounce.classList.add('show');
  clearTimeout(waveAnnTimeout);
  waveAnnTimeout = setTimeout(() => waveAnnounce.classList.remove('show'), 1800);
}

let puMsgTimeout;
function showPowerupMsg(label, color) {
  powerupMsg.textContent = `▸ ${label} ◂`;
  powerupMsg.style.color = color;
  powerupMsg.style.textShadow = `0 0 10px ${color}`;
  powerupMsg.classList.add('show');
  clearTimeout(puMsgTimeout);
  puMsgTimeout = setTimeout(() => powerupMsg.classList.remove('show'), 1500);
}

// ─── Game flow ───────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; wave = 1;
  bullets = []; enemies = []; enemyBullets = []; particles = []; powerups = [];
  initStars();
  initPlayer();
  spawnWave(wave);
  state = 'playing';
  overlay.classList.add('hidden');
  finalScoreEl.style.display = 'none';
  updateHUD();
  showWaveAnnounce(wave);
  if (frameId) cancelAnimationFrame(frameId);
  loop();
}

startBtn.addEventListener('click', startGame);

function gameOver() {
  state = 'dead';
  if (score > hiScore) { hiScore = score; localStorage.setItem('nv_hi', hiScore); }
  spawnExplosion(player.x, player.y, '#f44', 40, true);
  playExplode(true);
  setTimeout(() => {
    overlay.classList.remove('hidden');
    startBtn.textContent = 'PLAY AGAIN';
    finalScoreEl.style.display = 'block';
    finalScoreEl.textContent = `SCORE: ${score.toString().padStart(6,'0')}`;
    hiScoreEl.textContent = `HI-SCORE: ${hiScore.toString().padStart(6,'0')}`;
  }, 1200);
}

// ─── Draw helpers ────────────────────────────────────────────────────────────
function glow(color, blur = 10) {
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
}
function noGlow() { ctx.shadowBlur = 0; }

function drawShip(x, y, w, h, inv, shield) {
  const flicker = inv > 0 && Math.floor(inv / 4) % 2 === 0;
  if (flicker) return;
  ctx.save();
  ctx.translate(x, y);

  // engine trail
  const grad = ctx.createLinearGradient(0, 0, 0, h * 0.7);
  grad.addColorStop(0, '#0ff6');
  grad.addColorStop(1, '#0ff0');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-w * 0.15, h * 0.3);
  ctx.lineTo(w * 0.15, h * 0.3);
  ctx.lineTo(w * 0.08, h * 0.8 + Math.sin(Date.now() / 80) * 4);
  ctx.lineTo(-w * 0.08, h * 0.8 + Math.sin(Date.now() / 80) * 4);
  ctx.closePath();
  ctx.fill();

  // body
  glow('#0ff', 15);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.fillStyle = '#003';
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);
  ctx.lineTo(w / 2, h / 2);
  ctx.lineTo(w * 0.2, h * 0.3);
  ctx.lineTo(0, h * 0.15);
  ctx.lineTo(-w * 0.2, h * 0.3);
  ctx.lineTo(-w / 2, h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // cockpit
  ctx.fillStyle = '#0ff4';
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.05, w * 0.15, h * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();

  // shield bubble
  if (shield > 0) {
    const alpha = Math.min(1, shield / 30) * (0.5 + 0.2 * Math.sin(Date.now() / 120));
    glow('#4ff', 20);
    ctx.strokeStyle = `rgba(64,255,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.8, 0, Math.PI * 2);
    ctx.stroke();
  }

  noGlow();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.type === 'boss') {
    const t = Date.now() / 500;
    glow(e.color, 25);
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 3;
    ctx.fillStyle = '#200';

    // boss body - hex shape
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
      const r = e.r * (1 + 0.06 * Math.sin(t + i));
      i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
              : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // HP bar
    const barW = e.r * 2.5;
    ctx.fillStyle = '#300';
    ctx.fillRect(-barW/2, e.r + 8, barW, 5);
    ctx.fillStyle = e.color;
    ctx.fillRect(-barW/2, e.r + 8, barW * (e.hp / e.maxHp), 5);

    // inner glow
    ctx.fillStyle = `rgba(255,200,0,${0.15 + 0.1 * Math.sin(t * 2)})`;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.55, 0, Math.PI * 2); ctx.fill();

  } else if (e.type === 'tough') {
    glow(e.color, 14);
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 2;
    ctx.fillStyle = '#210';
    ctx.beginPath();
    ctx.moveTo(0, -e.r);
    ctx.lineTo(e.r * 0.87, e.r * 0.5);
    ctx.lineTo(-e.r * 0.87, e.r * 0.5);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // HP dots
    for (let i = 0; i < e.maxHp; i++) {
      ctx.fillStyle = i < e.hp ? e.color : '#333';
      ctx.beginPath(); ctx.arc(-e.r * 0.6 + i * e.r * 0.6, e.r + 8, 4, 0, Math.PI * 2); ctx.fill();
    }

  } else if (e.type === 'fast') {
    glow(e.color, 12);
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 1.5;
    ctx.fillStyle = '#003';
    ctx.beginPath();
    ctx.moveTo(0, -e.r);
    ctx.lineTo(e.r, 0);
    ctx.lineTo(0, e.r);
    ctx.lineTo(-e.r, 0);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

  } else {
    glow(e.color, 12);
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 2;
    ctx.fillStyle = '#102';
    ctx.beginPath();
    ctx.arc(0, 0, e.r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // eye
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.35, 0, Math.PI * 2); ctx.fill();
  }

  noGlow();
  ctx.restore();
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  glow(p.color, 15);
  ctx.strokeStyle = p.color;
  ctx.fillStyle = p.color + '33';
  ctx.lineWidth = 2;
  const s = 14;
  ctx.beginPath();
  ctx.rect(-s, -s, s * 2, s * 2);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = p.color;
  ctx.font = 'bold 18px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.icon, 0, 0);
  noGlow();
  ctx.restore();
}

// ─── Main loop ───────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts = 0) {
  frameId = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  update(dt);
  render();
}

function update(dt) {
  if (state !== 'playing') return;

  // stars
  for (const s of stars) {
    s.y += s.spd * dt;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  }

  // player movement
  const spd = player.spd * dt;
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= spd * 1.8;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += spd * 1.8;
  if (keys['ArrowUp'] || keys['KeyW']) player.y -= spd;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += spd;

  // mouse follow
  if (mouseX >= 0) {
    const dx = mouseX - player.x;
    player.x += dx * 0.12 * dt;
  }

  // auto-shoot on hold
  if (mouseDown || keys['Space']) shoot();

  // clamp
  player.x = Math.max(player.w / 2, Math.min(canvas.width - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(canvas.height - player.h / 2, player.y));

  // cooldowns
  if (player.shootCooldown > 0) player.shootCooldown -= dt;
  if (player.invincible > 0) player.invincible -= dt;
  if (player.shield > 0) player.shield -= dt * 0.3;
  if (player.rapidfire > 0) player.rapidfire -= dt;
  if (player.spread > 0) player.spread -= dt;

  // trail
  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 12) player.trail.shift();

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y < -20 || b.y > canvas.height + 20 || b.x < -20 || b.x > canvas.width + 20)
      bullets.splice(i, 1);
  }

  // enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y > canvas.height + 20 || b.x < -20 || b.x > canvas.width + 20)
      enemyBullets.splice(i, 1);
  }

  // enemies
  waveTimer += dt;
  for (const e of enemies) {
    if (e.type === 'boss') {
      e.phaseTimer += dt;
      if (e.phaseTimer > 120) {
        e.vx = -e.vx;
        e.vy = (e.phase % 3 === 0) ? 0.4 : (e.phase % 3 === 1) ? -0.4 : 0;
        e.phase++;
        e.phaseTimer = 0;
      }
      e.x += e.vx * dt; e.y += e.vy * dt;
      e.x = Math.max(e.r + 10, Math.min(canvas.width - e.r - 10, e.x));
      e.y = Math.max(e.r + 10, Math.min(canvas.height * 0.4, e.y));
    } else {
      e.wobble += 0.03 * dt;
      e.x += e.vx * dt + Math.sin(e.wobble) * 0.4 * dt;
      e.y += Math.abs(e.vy * 0.2) * dt;
      if (e.x < e.r || e.x > canvas.width - e.r) e.vx *= -1;
    }

    // enemy shoot
    if (Math.random() < e.fire * dt * (1 + wave * 0.15)) {
      const dx = player.x - e.x, dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const spd = e.type === 'boss' ? 5 : 3.5;
      enemyBullets.push({ x: e.x, y: e.y, vx: (dx / dist) * spd, vy: (dy / dist) * spd });
    }
  }

  // collision: player bullets vs enemies
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (!b.fromPlayer) continue;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx * dx + dy * dy < e.r * e.r) {
        bullets.splice(bi, 1);
        e.hp--;
        spawnExplosion(e.x, e.y, e.color, 6);
        if (e.hp <= 0) {
          score += e.pts * wave;
          spawnExplosion(e.x, e.y, e.color, e.type === 'boss' ? 60 : 22, e.type === 'boss');
          playExplode(e.type === 'boss');
          maybeDropPowerup(e.x, e.y);
          enemies.splice(ei, 1);
        }
        break;
      }
    }
  }

  // collision: enemy bullets vs player
  if (player.invincible <= 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      const dx = b.x - player.x, dy = b.y - player.y;
      if (dx * dx + dy * dy < (player.w * 0.4) ** 2) {
        enemyBullets.splice(i, 1);
        if (player.shield > 0) {
          player.shield = 0;
          spawnExplosion(player.x, player.y, '#4ff', 15);
          playHit();
        } else {
          takeDamage();
        }
        break;
      }
    }
  }

  // collision: enemies vs player
  if (player.invincible <= 0) {
    for (const e of enemies) {
      const dx = e.x - player.x, dy = e.y - player.y;
      if (dx * dx + dy * dy < (e.r + player.w * 0.4) ** 2) {
        if (player.shield > 0) { player.shield = 0; playHit(); }
        else takeDamage();
      }
    }
  }

  // powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy * dt;
    p.angle += 0.04 * dt;
    if (p.y > canvas.height + 40) { powerups.splice(i, 1); continue; }
    const dx = p.x - player.x, dy = p.y - player.y;
    if (dx * dx + dy * dy < 30 * 30) {
      applyPowerup(p);
      spawnExplosion(p.x, p.y, p.color, 12);
      playPowerup();
      showPowerupMsg(p.label, p.color);
      powerups.splice(i, 1);
    }
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.05 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // next wave
  if (enemies.length === 0 && !waveCleared) {
    waveCleared = true;
    setTimeout(() => {
      wave++;
      spawnWave(wave);
      updateHUD();
      showWaveAnnounce(wave);
      playLevelUp();
    }, 1500);
  }

  updateHUD();
}

function takeDamage() {
  lives--;
  updateHUD();
  player.invincible = 120;
  spawnExplosion(player.x, player.y, '#f44', 20);
  playHit();
  if (lives <= 0) { setTimeout(gameOver, 400); state = 'dying'; }
}

function applyPowerup(p) {
  if (p.id === 'shield')    player.shield = 300;
  if (p.id === 'rapidfire') player.rapidfire = 300;
  if (p.id === 'spread')    player.spread = 200;
  if (p.id === 'life')      { lives = Math.min(lives + 1, 5); updateHUD(); }
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background
  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle grid
  ctx.strokeStyle = '#0ff05';
  ctx.lineWidth = 0.5;
  const gridSpacing = 50;
  for (let x = 0; x < canvas.width; x += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // stars
  for (const s of stars) {
    const bright = 0.4 + 0.6 * Math.abs(Math.sin(s.bright + Date.now() / 2000));
    ctx.fillStyle = `rgba(200,220,255,${bright * 0.9})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    glow(p.color, 8);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  noGlow();

  // enemy bullets
  for (const b of enemyBullets) {
    glow('#f44', 10);
    ctx.fillStyle = '#f44';
    ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2); ctx.fill();
  }
  noGlow();

  // player bullets
  for (const b of bullets) {
    if (!b.fromPlayer) continue;
    const col = player.spread > 0 ? '#f4f' : (player.rapidfire > 0 ? '#f84' : '#0ff');
    glow(col, 12);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - b.vx * 3, b.y - b.vy * 3);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
  }
  noGlow();

  // enemies
  for (const e of enemies) drawEnemy(e);

  // powerups
  for (const p of powerups) drawPowerup(p);

  // player trail
  for (let i = 0; i < player.trail.length; i++) {
    const t = player.trail[i];
    const alpha = (i / player.trail.length) * 0.25;
    ctx.fillStyle = `rgba(0,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 3 * (i / player.trail.length), 0, Math.PI * 2);
    ctx.fill();
  }

  // player
  if (state === 'playing' || state === 'dying') {
    drawShip(player.x, player.y, player.w, player.h, player.invincible, player.shield);
  }

  // custom cursor crosshair
  if (mouseX >= 0 && state === 'playing') {
    ctx.strokeStyle = '#0ff8';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mouseX - 10, player.y - player.h / 2);
    ctx.lineTo(mouseX + 10, player.y - player.h / 2);
    ctx.stroke();
    glow('#0ff', 6);
    ctx.strokeStyle = '#0ff';
    ctx.beginPath();
    ctx.moveTo(mouseX, player.y - player.h / 2 - 5);
    ctx.lineTo(mouseX, player.y - player.h / 2 + 5);
    ctx.stroke();
    noGlow();
  }

  noGlow();
  ctx.globalAlpha = 1;
}

// ─── Init idle animation ──────────────────────────────────────────────────────
hiScoreEl.textContent = hiScore > 0 ? `HI-SCORE: ${hiScore.toString().padStart(6,'0')}` : '';
initStars();

function idleLoop(ts = 0) {
  if (state !== 'idle') return;
  frameId = requestAnimationFrame(idleLoop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    s.y += s.spd * 0.8;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    const bright = 0.4 + 0.6 * Math.abs(Math.sin(s.bright + ts / 2000));
    ctx.fillStyle = `rgba(200,220,255,${bright * 0.9})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
}
idleLoop();
</script>
